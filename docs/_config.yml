title: Salesforce AgentMemory
description: Cross-cloud memory architecture for Salesforce — zero middleware, self-tuning confidence engine
baseurl: "/Salesforce-AgentMemory"
url: "https://jayavardhan-raju.github.io"

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: light

aux_links:
  "GitHub":
    - "https://github.com/jayavardhan-raju/Salesforce-AgentMemory"

nav_external_links:
  - title: GitHub Repository
    url: https://github.com/jayavardhan-raju/Salesforce-AgentMemory

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Footer
footer_content: "Salesforce AgentMemory — Built by <a href=\"https://github.com/jayavardhan-raju\">Jayavardhan Raju</a>"

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Collections / navigation structure
just_the_docs:
  collections:
    docs:
      name: Documentation
      nav_fold: false

# Kramdown settings
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Exclude files
exclude:
  - node_modules/
  - force-app/
  - config/
  - scripts/
  - manifest/
  - "*.json"
  - "*.js"
  - .husky/
  - .vscode/
