name: Live Demo Provisioning

on:
  repository_dispatch:
    types: [live-demo-requested]

permissions:
  contents: read

env:
  SOURCE_REPO: jayavardhan-raju/Salesforce-AgentMemory
  SCRATCH_ORG_MODE: ${{ github.event.client_payload.scratch_org_mode || 'create' }}
  SCRATCH_ORG_DURATION_DAYS: ${{ github.event.client_payload.scratch_org_duration_days || '30' }}
  SCRATCH_ALIAS: agentmemory-demo-${{ github.run_id }}
  ARTIFACT_DIR: artifacts/live-demo/${{ github.run_id }}

jobs:
  provision:
    name: Provision requester demo org
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare artifact directory
        run: mkdir -p "$ARTIFACT_DIR"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Salesforce CLI and demo tooling
        run: |
          npm install --global @salesforce/cli
          npm install --no-save --no-package-lock --omit=dev nodemailer

      - name: Verify requester fork
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/live-demo/verify-fork.mjs

      - name: Claim requester Dev Hub auth URL
        env:
          DEMO_BROKER_CLAIM_URL: ${{ vars.DEMO_BROKER_CLAIM_URL }}
          DEMO_BROKER_ACTIONS_TOKEN: ${{ secrets.DEMO_BROKER_ACTIONS_TOKEN }}
        run: |
          set +x
          AUTH_URL="$(node scripts/live-demo/claim-auth-url.mjs)"
          echo "::add-mask::$AUTH_URL"
          AUTH_FILE="$RUNNER_TEMP/sfauth.txt"
          printf '%s' "$AUTH_URL" > "$AUTH_FILE"
          sf org login sfdx-url --sfdx-url-file "$AUTH_FILE" --alias requester-devhub --set-default-dev-hub --json > "$RUNNER_TEMP/devhub-login.json"
          rm -f "$AUTH_FILE"
          unset AUTH_URL

      - name: Select or create scratch org
        run: |
          node scripts/live-demo/select-scratch-org.mjs \
            --target-dev-hub requester-devhub \
            --alias "$SCRATCH_ALIAS" \
            --duration-days "$SCRATCH_ORG_DURATION_DAYS" \
            --definition-file config/project-scratch-def.json \
            --artifacts "$ARTIFACT_DIR"

      - name: Deploy Salesforce AgentMemory
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org "$SCRATCH_ALIAS" \
            --test-level NoTestRun \
            --wait 30 \
            --json > "$ARTIFACT_DIR/deploy.json"

      - name: Assign AgentMemory access permission set
        run: |
          sf org assign permset \
            --name AgentMemory_Access \
            --target-org "$SCRATCH_ALIAS" \
            --json > "$ARTIFACT_DIR/permset-assignment.json"

      - name: Generate scratch org password
        run: |
          sf org generate password --target-org "$SCRATCH_ALIAS" --json > "$RUNNER_TEMP/scratch-password.json"
          node scripts/live-demo/write-org-credentials.mjs \
            --target-org "$SCRATCH_ALIAS" \
            --password-json "$RUNNER_TEMP/scratch-password.json" \
            --credentials "$RUNNER_TEMP/org-credentials.json" \
            --summary "$ARTIFACT_DIR/org-summary.json" \
            --duration-days "$SCRATCH_ORG_DURATION_DAYS"

      - name: Execute demo scenarios and Apex tests
        # Runs the three TC demo scripts and the AgentMemoryServiceTest suite with
        # code coverage. The runner records honest pass/fail + coverage rather than
        # halting, so the requester email always reflects the real outcome.
        run: node scripts/live-demo/run-apex-scenarios.mjs --target-org "$SCRATCH_ALIAS" --artifacts "$ARTIFACT_DIR"

      - name: Upload live demo artifacts
        if: always()
        id: upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: live-demo-${{ github.run_id }}
          path: ${{ env.ARTIFACT_DIR }}
          retention-days: 30
          if-no-files-found: warn

      - name: Send Mailtrap demo email
        if: always()
        env:
          MAILTRAP_USER: ${{ secrets.MAILTRAP_USER }}
          MAILTRAP_PASS: ${{ secrets.MAILTRAP_PASS }}
          MAILTRAP_FROM_EMAIL: ${{ vars.MAILTRAP_FROM_EMAIL }}
          MAILTRAP_FROM_NAME: ${{ vars.MAILTRAP_FROM_NAME }}
          ARTIFACT_URL: ${{ steps.upload-artifacts.outputs.artifact-url }}
        run: |
          node scripts/live-demo/send-mailtrap-email.mjs \
            --artifacts "$ARTIFACT_DIR" \
            --credentials "$RUNNER_TEMP/org-credentials.json" \
            --status "${{ job.status }}" \
            --duration-days "$SCRATCH_ORG_DURATION_DAYS"
